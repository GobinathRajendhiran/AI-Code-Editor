<div class="auth-wrap">
  <div class="auth-card">
    <p class="eyebrow">Interview Practice</p>
    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to continue to Code AI Analyzer.</p>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <div class="field">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="you@example.com"
          [class.invalid]="submitted && f.email.invalid"
        />
        @if (submitted && f.email.invalid) {
          <p class="error">Enter a valid email address.</p>
        }
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="••••••••"
          [class.invalid]="submitted && f.password.invalid"
        />
        @if (submitted && f.password.invalid) {
          <p class="error">Password must be at least 6 characters.</p>
        }
      </div>

      <div class="row-between">
        <label class="remember">
          <input type="checkbox" formControlName="remember" />
          Remember me
        </label>
        <a class="link" href="#">Forgot password?</a>
      </div>

      <button type="submit" class="btn btn-primary">Sign in</button>
    </form>

    <div class="divider">or continue with</div>

    <div class="sso">
      <button type="button" class="sso-btn" (click)="ssoLogin('google')">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.76h3.56c2.08-1.92 3.28-4.74 3.28-8.09Z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.56-2.76c-.98.66-2.24 1.06-3.72 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84A11 11 0 0 0 12 23Z"/>
          <path fill="#FBBC05" d="M5.84 14.11a6.6 6.6 0 0 1 0-4.22V7.05H2.18a11 11 0 0 0 0 9.9l3.66-2.84Z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.05l3.66 2.84C6.71 7.31 9.14 5.38 12 5.38Z"/>
        </svg>
        Google
      </button>

      <button type="button" class="sso-btn" (click)="ssoLogin('github')">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="#131A2E">
          <path d="M12 1a11 11 0 0 0-3.48 21.44c.55.1.75-.24.75-.53v-2.06c-3.06.66-3.71-1.29-3.71-1.29-.5-1.27-1.22-1.61-1.22-1.61-1-.68.08-.67.08-.67 1.1.08 1.68 1.13 1.68 1.13.98 1.68 2.57 1.2 3.2.92.1-.71.38-1.2.7-1.48-2.44-.28-5.01-1.22-5.01-5.43 0-1.2.43-2.18 1.13-2.95-.11-.28-.49-1.4.11-2.91 0 0 .92-.3 3.02 1.13a10.5 10.5 0 0 1 5.5 0c2.1-1.43 3.02-1.13 3.02-1.13.6 1.51.22 2.63.11 2.91.7.77 1.13 1.75 1.13 2.95 0 4.22-2.58 5.15-5.03 5.42.4.34.75 1.01.75 2.04v3.03c0 .3.2.64.76.53A11 11 0 0 0 12 1Z"/>
        </svg>
        GitHub
      </button>
    </div>

    <p class="switch">
      Don't have an account?
      <a class="link" routerLink="/signup">Sign up</a>
    </p>
  </div>
</div>
